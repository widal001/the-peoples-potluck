<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b888f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#466f77;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d6255;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F5045;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#954c50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#803d41;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Plate -->
  <circle cx="250" cy="250" r="200" fill="url(#plateGrad)" opacity="0.35"/>
  
  <!-- Rim accent -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="url(#rimGrad)" stroke-width="3" opacity="0.5"/>
  
  <!-- Inner circle -->
  <circle cx="250" cy="250" r="120" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
</svg>
