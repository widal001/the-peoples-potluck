name: "CD - Deploy Preview to Cloudflare"

on:
  pull_request:

env:
  # Configure these as repository variables in GitHub Settings > Secrets and variables > Actions
  PREFIX: ${{ vars.WORKER_PREFIX }}
  CLOUDFLARE_WORKERS_DOMAIN: ${{ vars.CLOUDFLARE_WORKERS_DOMAIN }}

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Deploy PR preview
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install website dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

      - name: Apply D1 migrations (preview)
        run: pnpm db:migrate:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Astro site
        run: pnpm build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID_PREVIEW }}

      - name: Deploy to Cloudflare
        run: |
          WORKER_NAME="${{ env.PREFIX }}-pr-${{ github.event.pull_request.number }}"

          # Deploy worker
          pnpm exec wrangler deploy --name "$WORKER_NAME" --var DRY_RUN:false

          # Set secrets
          printf '%s' "$SLACK_WEBHOOK_URL" | pnpm exec wrangler secret put SLACK_WEBHOOK_URL --name "$WORKER_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_PREVIEW }}

      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Website Preview Deployed

      - name: Post preview link comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **Website Preview Deployed!**

            Preview your changes at: https://${{ env.PREFIX }}-pr-${{ github.event.pull_request.number }}.${{ env.CLOUDFLARE_WORKERS_DOMAIN }}

            This preview will be automatically deleted when the PR is closed.
          edit-mode: replace
