name: "CD - Cleanup PR Preview"

on:
  pull_request:
    types: [closed]

env:
  PREFIX: ${{ vars.WORKER_PREFIX }}

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    name: Cleanup PR preview
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete Worker for PR
        run: |
          pnpm exec wrangler delete --name ${{ env.PREFIX }}-pr-${{ github.event.pull_request.number }} --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview link comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🗑️ **Preview Cleaned Up**

            The preview for this PR has been automatically deleted.
          edit-mode: replace
